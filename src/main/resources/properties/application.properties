# ============================================
# APPLICATION
# ============================================
app.name=PayWallet Lite
app.version=1.0.0
app.environment=dev

# ============================================
# DATABASE (Oracle XE)
# ============================================
db.driver=oracle.jdbc.OracleDriver
db.url=jdbc:oracle:thin:@//localhost:1521/PWLDB
db.username=pwl_app
db.password=AppPass456!

# ============================================
# CONNECTION POOL
# ============================================
db.pool.initialSize=5
db.pool.maxActive=20

# ============================================
# JPA / HIBERNATE
# ============================================
jpa.dialect=org.hibernate.dialect.OracleDialect
jpa.showSql=true
jpa.formatSql=true
jpa.ddlAuto=validate
jpa.generateDdl=false

# ============================================
# SECURITY
# ============================================
# JWT Configuration
jwt.access.secret=PayWalletLiteSuperUltraSecureAccessSecretKeyForHS512TokenGeneration2026BackendSecurityLayer
jwt.refresh.secret=PayWalletLiteSuperUltraSecureRefreshSecretKeyForHS512TokenGeneration2026BackendSecurityLayer
jwt.access.validity=86400000
jwt.refresh.validity=604800000

# ============================================
# KAFKA (local dev)
# ============================================
kafka.bootstrapServers=localhost:9092
kafka.groupId=paywallet-lite-group
kafka.autoOffsetReset=earliest

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.com.paylogic=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Crypto
crypto.master.key=VOTRE_CLE_MAITRE_32_CHARS_MINIMUM_REQ
crypto.key.lifetime.days=365
crypto.key.rotation.threshold.days=30
