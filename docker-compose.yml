version: '3.9'

services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: pwl-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: DevPass123!
      ORACLE_DATABASE: PWLDB
      APP_USER: pwl_app
      APP_USER_PASSWORD: AppPass456!
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./init-oracle.sql:/container-entrypoint-initdb.d/02-init.sql:ro  # ← Script post-init
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s  # ← Augmenté pour laisser temps d'ouverture


volumes:
  oracle-data: